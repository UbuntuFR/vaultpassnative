app-id: com.vaultpass.VaultPass
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: vaultpass-native

finish-args:
  # X11 + Wayland display access
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # GPU acceleration
  - --device=dri

  # Network (for potential future sync features)
  - --share=network

  # File access for vault storage
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

  # D-Bus access for system integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Portal

  # Lock files for security
  - --lock-file=/run/user/1000/vaultpass.lock

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/vaultpass-native/cargo
    npm_config_nodedir: /usr/lib/sdk/node20

modules:
  - name: vaultpass-native
    buildsystem: simple
    build-commands:
      - cargo build --release --manifest-path Cargo.toml
      - install -Dm755 target/release/vaultpass-native /app/bin/vaultpass-native
      - install -Dm644 com.vaultpass.VaultPass.desktop /app/share/applications/com.vaultpass.VaultPass.desktop
      - install -Dm644 com.vaultpass.VaultPass.metainfo.xml /app/share/metainfo/com.vaultpass.VaultPass.metainfo.xml
    sources:
      - type: dir
        path: .
      - type: file
        path: Cargo.lock
